aid: university-of-alberta
name: University of Alberta
description: >-
  The University of Alberta is a public research university in Edmonton, Alberta,
  Canada, ranked #67 in the QS World University Rankings 2025. Its public,
  documented developer/API footprint is modest and decentralized: the central
  api.ualberta.ca site is a placeholder noting that the institution is "currently
  working to improve the way data is cataloged, shared, and governed," with no
  self-service developer portal yet. The strongest confirmed programmatic access
  is research data via the Borealis (Canadian Dataverse) repository, which exposes
  the University of Alberta research data collection through a REST Native/Search
  API and an OAI-PMH metadata endpoint. The University of Alberta Library also
  maintains an active open-source GitHub organization (ualbertalib). Course
  catalogue and Bear Tracks remain web-only with no official public API.
